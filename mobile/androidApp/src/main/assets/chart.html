<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
        /* Premium Dark Theme */
        html,
        body {
            margin: 0;
            padding: 0;
            background-color: #0D0D1A;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        #container {
            width: 100%;
            height: 100vh;
            min-height: 400px;
            background-color: #0D0D1A;
        }
    </style>
    <script src="lightweight-charts.js"></script>
</head>

<body>
    <div id="container"></div>

    <script>
        let chart;
        let candleSeries;

        // Premium Dark Color Palette
        const colors = {
            background: '#0D0D1A',
            textPrimary: '#FFFFFF',
            textSecondary: '#8B8B9E',
            gridLines: '#1A1A2E',
            crosshair: '#6C5CE7',
            upColor: '#00D26A',
            downColor: '#FF4757',
            upWick: '#00D26A',
            downWick: '#FF4757',
            borderColor: '#252542'
        };

        function createChart() {
            const container = document.getElementById('container');

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: container.clientHeight,
                layout: {
                    background: { type: 'solid', color: colors.background },
                    textColor: colors.textSecondary,
                    fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif',
                },
                grid: {
                    vertLines: { color: colors.gridLines, style: 1 },
                    horzLines: { color: colors.gridLines, style: 1 }
                },
                timeScale: {
                    timeVisible: true,
                    secondsVisible: false,
                    borderColor: colors.borderColor,
                    barSpacing: 12,
                },
                rightPriceScale: {
                    borderColor: colors.borderColor,
                    scaleMargins: {
                        top: 0.1,
                        bottom: 0.1,
                    },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: {
                        color: colors.crosshair,
                        width: 1,
                        style: 2,
                        labelBackgroundColor: colors.crosshair,
                    },
                    horzLine: {
                        color: colors.crosshair,
                        width: 1,
                        style: 2,
                        labelBackgroundColor: colors.crosshair,
                    },
                },
                handleScale: {
                    axisPressedMouseMove: true,
                },
                handleScroll: {
                    mouseWheel: true,
                    pressedMouseMove: true,
                    horzTouchDrag: true,
                    vertTouchDrag: false,
                },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: colors.upColor,
                downColor: colors.downColor,
                borderUpColor: colors.upColor,
                borderDownColor: colors.downColor,
                wickUpColor: colors.upWick,
                wickDownColor: colors.downWick,
                borderVisible: false,
            });

            // Responsive resize
            window.addEventListener('resize', () => {
                chart.resize(container.clientWidth, container.clientHeight);
            });
        }

        // Called from Kotlin when data is ready
        window.updateChartData = function (jsonString) {
            try {
                if (!chart) createChart();

                let rawData = JSON.parse(jsonString);
                if (!rawData || rawData.length === 0) return;

                // Data transformation
                let cleanData = rawData.map(item => ({
                    time: Number(item.time || item.t),
                    open: Number(item.open || item.o),
                    high: Number(item.high || item.h),
                    low: Number(item.low || item.l),
                    close: Number(item.close || item.c)
                }));

                // Convert milliseconds to seconds if needed
                if (cleanData.length > 0 && cleanData[0].time > 20000000000) {
                    cleanData = cleanData.map(d => ({ ...d, time: Math.floor(d.time / 1000) }));
                }

                // Sort by time
                cleanData.sort((a, b) => a.time - b.time);

                // Set data and fit
                candleSeries.setData(cleanData);
                chart.timeScale().fitContent();

            } catch (e) {
                console.error("Chart Error:", e);
            }
        }

        // Initialize chart
        createChart();
    </script>
</body>

</html>
